name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # serialport links against libudev on Linux.
      - name: Install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  # tower-cli and tower-hil consume jolt with `default-features = false` (no clap/anyhow/
  # indicatif). Build+test that exact configuration so a CLI-only dependency leaking into the
  # library fails HERE, not in a downstream repo's CI.
  library:
    name: Library only (no default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: no-default-features

      - name: Clippy (library config)
        run: cargo clippy --no-default-features --all-targets -- -D warnings

      - name: Test (library config)
        run: cargo test --no-default-features

  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install libudev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      # The lint job tests on Linux only; run the behavioural tests on every OS the
      # release ships for (timeout/port logic is the platform-sensitive part).
      - name: Test
        run: cargo test
